model: deepseek-v4-pro-codex
label:
  en_US: deepseek-v4-pro-codex
  zh_Hans: deepseek-v4-pro-codex
model_type: llm
features:
- multi-tool-call
- stream-tool-call
- agent-thought
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
- name: temperature
  use_template: temperature
- name: top_p
  use_template: top_p
- name: presence_penalty
  use_template: presence_penalty
- name: frequency_penalty
  use_template: frequency_penalty
- name: max_tokens
  use_template: max_tokens
  default: 4096
  min: 1
  max: 384000
