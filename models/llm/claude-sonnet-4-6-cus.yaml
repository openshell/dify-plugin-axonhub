model: Claude Sonnet 4.6-cus
label:
  en_US: Claude Sonnet 4.6-cus
  zh_Hans: Claude Sonnet 4.6-cus
model_type: llm
features:
- multi-tool-call
- stream-tool-call
- vision
- agent-thought
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
- name: temperature
  use_template: temperature
- name: top_p
  use_template: top_p
- name: presence_penalty
  use_template: presence_penalty
- name: frequency_penalty
  use_template: frequency_penalty
- name: max_tokens
  use_template: max_tokens
  default: 4096
  min: 1
  max: 64000
